<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema DOJA Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FFF6F7]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PRODUCTOS = [
            { id: 1, nombre: "JOJO DIARY LIP GLOSS", precio: 4500, cat: "MAQUILLAJE", emoji: "💄" },
            { id: 2, nombre: "GEGE BEAR LIP GLAZE X3", precio: 12000, cat: "MAQUILLAJE", emoji: "💋" },
            { id: 3, nombre: "Uñas Press On Coquette", precio: 4500, cat: "UÑAS", emoji: "🎀" },
            { id: 4, nombre: "Base Cushion Gege Bear", precio: 12000, cat: "MAQUILLAJE", emoji: "✨" },
            { id: 5, nombre: "Llavero Tanjiro", precio: 4000, cat: "ACCESORIOS", emoji: "⚔️" }
        ];

        function App() {
            const [role, setRole] = useState('customer');
            const [carrito, setCarrito] = useState([]);

            return (
                <div className="min-h-screen text-[#5C1B26]">
                    {/* Barra de control */}
                    <div className="bg-[#5C1B26] text-white p-2 text-center text-xs font-bold cursor-pointer" onClick={() => setRole(role === 'customer' ? 'admin' : 'customer')}>
                        MODO: {role.toUpperCase()} (Click para cambiar rol)
                    </div>

                    <header className="p-6 bg-white border-b border-[#FCD3D9] flex justify-between items-center">
                        <h1 className="text-2xl font-black tracking-widest text-[#5C1B26]">DOJA</h1>
                        {role === 'customer' && (
                            <div className="bg-[#FFE3E7] px-4 py-2 rounded-full font-bold text-sm">
                                Carrito: {carrito.length}
                            </div>
                        )}
                    </header>

                    <main className="p-6 max-w-5xl mx-auto">
                        {role === 'customer' ? (
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {PRODUCTOS.map(p => (
                                    <div key={p.id} className="bg-white p-4 rounded-2xl border border-[#FCD3D9] shadow-sm">
                                        <div className="text-4xl mb-2">{p.emoji}</div>
                                        <h3 className="font-bold text-xs">{p.nombre}</h3>
                                        <p className="text-[#E58B9D] font-black my-2">${p.precio}</p>
                                        <button 
                                            onClick={() => setCarrito([...carrito, p])}
                                            className="w-full bg-[#5C1B26] text-white py-1 rounded-lg text-[10px] font-bold"
                                        >
                                            AGREGAR
                                        </button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-10 rounded-3xl border border-[#7C3543] text-center">
                                <h2 className="text-2xl font-black">PANEL DE ADMINISTRACIÓN</h2>
                                <p className="mt-2">Sistema cargado: {PRODUCTOS.length} productos en inventario.</p>
                                <div className="mt-6 p-4 bg-[#FFF0F2] rounded-xl text-sm">
                                    Total de pedidos: 0 | Ventas hoy: $0
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
