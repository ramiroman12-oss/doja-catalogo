!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo DOJA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { Trash2, Moon, Sun, Save, Package } = {
            Trash2: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18m-2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>,
            Moon: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>,
            Sun: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>,
            Save: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>,
            Package: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5M12 12v9M12 12l-8-4.5"/></svg>
        };

        const PRODUCTOS_INICIALES = [
            { id: 1, nombre: "JOJO DIARY LIP GLOSS", precio: 4500, categoria: "MAQUILLAJE", sku: "DOJA-016", image: "" },
            { id: 2, nombre: "GEGE BEAR LIP GLAZE X3", precio: 12000, categoria: "MAQUILLAJE", sku: "DOJA-017", image: "" },
            { id: 3, nombre: "Uñas Press On Coquette", precio: 4500, categoria: "UÑAS PRESS ON", sku: "DOJA-UN-001", image: "" },
            { id: 4, nombre: "Uñas Press On Sanrio", precio: 4500, categoria: "UÑAS PRESS ON", sku: "DOJA-UN-002", image: "" },
            { id: 5, nombre: "Llavero Tanjiro", precio: 4000, categoria: "ACCESORIOS", sku: "DOJA-ACC-001", image: "" }
        ];

        function App() {
            const [inventario, setInventario] = useState(PRODUCTOS_INICIALES);
            const [darkMode, setDarkMode] = useState(false);
            const [urls, setUrls] = useState({});

            const eliminarProducto = (id) => {
                if (confirm("¿Seguro?")) setInventario(prev => prev.filter(p => p.id !== id));
            };

            const guardarImagen = (id) => {
                setInventario(prev => prev.map(p => p.id === id ? { ...p, image: urls[id] || p.image } : p));
                alert("Imagen guardada");
            };

            return (
                <div className={`min-h-screen p-4 ${darkMode ? 'bg-zinc-900 text-white' : 'bg-[#FFF6F7] text-stone-800'}`}>
                    <header className="flex justify-between items-center pb-6 border-b mb-6">
                        <h1 className="text-xl font-black">DOJA ADMIN</h1>
                        <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-[#FFE3E7] rounded-full">
                            {darkMode ? <Sun size={20} /> : <Moon size={20} />}
                        </button>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        {inventario.map(p => (
                            <div key={p.id} className="bg-white p-4 rounded-2xl border shadow-sm">
                                <div className="h-32 bg-stone-100 flex items-center justify-center mb-2 overflow-hidden">
                                    {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <Package size={40} className="text-stone-300"/>}
                                </div>
                                <h3 className="font-bold text-sm mb-1">{p.nombre}</h3>
                                <input className="w-full text-xs p-2 border rounded-lg mb-2" placeholder="Link imagen..." onChange={(e) => setUrls({...urls, [p.id]: e.target.value})} />
                                <div className="flex gap-2">
                                    <button onClick={() => guardarImagen(p.id)} className="flex-1 bg-[#E58B9D] text-white p-2 rounded-lg text-xs">Guardar</button>
                                    <button onClick={() => eliminarProducto(p.id)} className="bg-red-100 text-red-600 px-3 rounded-lg"><Trash2 size={16}/></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
