<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo DOJA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- AQUÍ VA TODO EL CÓDIGO DE TU APP.JSX ---
        const { useState, useMemo } = React;
        const PRODUCTOS_DATA = [
            { id: "jojo-diary-lip-gloss", nombre: "JOJO DIARY LIP GLOSS", precio: 4500, categoria: "MAQUILLAJE", fallback: "💄" },
            { id: "gege-bear-lip-glaze-x3", nombre: "GEGE BEAR LIP GLAZE X3", precio: 12000, categoria: "MAQUILLAJE", fallback: "💋" },
            { id: "unas-press-on-coquette", nombre: "Uñas Press On Coquette Style", precio: 4500, categoria: "UÑAS PRESS ON", fallback: "🎀" },
            { id: "llavero-tanjiro", nombre: "Llavero Demon Slayer - Tanjiro", precio: 4000, categoria: "ACCESORIOS", fallback: "⚔️" }
        ];

        function App() {
            return (
                <div className="min-h-screen bg-[#FFF6F7] p-8">
                    <h1 className="text-3xl font-black text-[#7C3543] mb-6 text-center">CATÁLOGO DOJA</h1>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {PRODUCTOS_DATA.map(p => (
                            <div key={p.id} className="bg-white p-6 rounded-3xl border border-[#FCD3D9] shadow-lg text-center">
                                <span className="text-5xl">{p.fallback}</span>
                                <h2 className="font-bold mt-4 text-[#7C3543]">{p.nombre}</h2>
                                <p className="text-sm text-stone-500">{p.categoria}</p>
                                <p className="font-black text-xl mt-2">${p.precio}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
